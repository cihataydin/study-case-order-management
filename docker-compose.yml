version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    networks:
      - ecommerce-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ecommerce-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - ecommerce-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672" # AMQP protocol port
      - "15672:15672" # Management UI
    networks:
      - ecommerce-network

  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus_alerts.yml:/etc/prometheus/prometheus_alerts.yml
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ecommerce-network

  grafana:
    image: grafana/grafana:latest
    container_name: ecommerce-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    ports:
      - "3000:3000"
    networks:
      - ecommerce-network

  order-api:
    build:
      context: .
      dockerfile: src/OrderService.Api/Dockerfile
    container_name: ecommerce-order-api
    ports:
      - "5277:5277"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ecommerce_order_db;Username=root;Password=rootpassword
      - RabbitMQ__Host=rabbitmq
      - InventoryServiceUrl=http://inventory-api:5051
      - Otlp__Endpoint=http://jaeger:4317
    depends_on:
      - postgres
      - rabbitmq
    profiles: ["apps"]
    networks:
      - ecommerce-network

  inventory-api:
    build:
      context: .
      dockerfile: src/InventoryService.Api/Dockerfile
    container_name: ecommerce-inventory-api
    ports:
      - "5050:5050"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ecommerce_inventory_db;Username=root;Password=rootpassword
      - RabbitMQ__Host=rabbitmq
      - Redis__ConnectionString=redis:6379
      - Otlp__Endpoint=http://jaeger:4317
    depends_on:
      - postgres
      - rabbitmq
      - redis
    profiles: ["apps"]
    networks:
      - ecommerce-network

  payment-api:
    build:
      context: .
      dockerfile: src/PaymentService.Api/Dockerfile
    container_name: ecommerce-payment-api
    ports:
      - "5032:5032"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ecommerce_payment_db;Username=root;Password=rootpassword
      - RabbitMQ__Host=rabbitmq
      - Otlp__Endpoint=http://jaeger:4317
    depends_on:
      - postgres
      - rabbitmq
    profiles: ["apps"]
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres_data:

