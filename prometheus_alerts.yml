groups:
- name: ecommerce_alerts
  rules:
  - alert: HighErrorRate
    expr: rate(orders_failed_count[5m]) > 0.05
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "High Order Failure Rate"
      description: "Order failure rate has exceeded 5% in the last 5 minutes."

  - alert: LowOrderSuccess
    expr: rate(orders_success_count[1m]) == 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "No successful orders"
      description: "There have been no successful orders in the last 5 minutes. Check payment and inventory services."
