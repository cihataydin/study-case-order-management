global:
  scrape_interval: 5s

rule_files:
  - "/etc/prometheus/prometheus_alerts.yml"

scrape_configs:
  - job_name: 'ecommerce-services'
    metrics_path: '/metrics'
    static_configs:
      - targets: 
        - 'host.docker.internal:5277' # OrderService
        - 'host.docker.internal:5050' # InventoryService
        - 'host.docker.internal:5032' # PaymentService

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
